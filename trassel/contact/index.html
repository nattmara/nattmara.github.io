<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Trassel Support</title>
  <style>
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      max-width: 650px;
      padding: 8px;
      background: #FAFAFA;
      color: #0A0A0B;
    }

    h1 {
      margin-bottom: 32px;
    }

    h3 {
      margin: 0;
    }

    input,
    textarea {
      display: block;
      box-sizing: border-box;
      width: 100%;
      padding: 12.5px 17.5px 13.5px;
      margin-bottom: 5px;
      border-radius: 18.5px;
      font-size: inherit;
      font-family: inherit;
      background-color: #EBEBED;
      border: none;
      resize: none;
    }

    .error {
      background-color: rgba(245, 225, 227, 1);
      color: rgba(255, 0, 0, 1)
    }

    input::placeholder,
    textarea::placeholder {
      font-style: italic;
      font-weight: 500;
      color: rgba(10, 10, 11, 0.5);
    }

    .error::placeholder {
      color: rgba(245, 10, 11, 0.5);
    }

    button {
      box-sizing: border-box;
      width: 100%;
      padding: 15px 20px 17px;
      margin-bottom: 32px;
      border-radius: 21px;
      font-size: inherit;
      font-family: inherit;
      font-weight: 500;
      background-color: #323236;
      color: #FAFAFA;
      border: none;
      resize: none;
      transition: all 0.2s ease-out;
    }

    button:active {
      width: calc(100% - 6px);
      padding: 12px 17px 14px;
      margin: 3px;
      border-radius: 18px;
      transition: all 0.1s ease-in;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px;
      }
    }

    @media (min-width: 1024px) {
      body {
        padding: 48px;
      }
    }
  </style>
</head>

<body>

  <h1>Contact Trassel Support</h1>
  
  <input type="text" id="subject" name="subject" placeholder="subject" required>
  <textarea id="message" name="message" placeholder="message" rows="10" required></textarea>
  <button type="submit" id="send">send</button>

  <script>
    const subject = document.getElementById('subject');
    const message = document.getElementById('message');
    const send = document.getElementById('send');

    function updateSend() {
      const allFilled = subject.value && message.value;
      send.style.color = allFilled ? 'rgba(250,250,250,1)' : 'rgba(250,250,250,0.5)';
    }
    
    [subject, message].forEach(field => {
      field.addEventListener('input', () => {
        field.classList.remove('error');
        updateSend()
      });
    });
    
    updateSend();
    
    send.addEventListener('click', () => {
      const fields = [subject, message];
      const emptyFields = fields.filter(f => !f.value);
      
      fields.forEach(f => {
        f.classList.toggle('error', !f.value);
      });
      
      if (emptyFields.length > 0) return;
      
      window.location.href = `mailto:developer@nattmara.com?subject=${encodeURIComponent(subject.value)}&body=${encodeURIComponent(message.value)}`;
    });
  </script>
</body>

</html>
